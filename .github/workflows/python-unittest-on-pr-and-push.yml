name: Python unittest

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  python_unittest:
    name: Python unittest

    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6
    - name: Install Ruff and Sphinx
      run: pip install ruff sphinx

    - name: Ruff Check
      run: ruff check --output-format=github
    - name: Ruff Format Check
      run: ruff format --check

    - name: Python Unittest
      run: python3 -m unittest --verbose

    # Windows purposely fails when importing parallel.py as it does not support fork.
    - name: Sphinx (Ubuntu/macOS)
      if: runner.os != 'Windows'
      run: python -m sphinx.cmd.build --builder html . _build --fresh-env --fail-on-warning
      working-directory: docs
    - name: Sphinx (Windows)
      if: runner.os == 'Windows'
      run: python -m sphinx.cmd.build --builder html . _build --fresh-env
      working-directory: docs
